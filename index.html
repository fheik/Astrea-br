<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechFounder BR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen pb-20">
  <div class="max-w-md mx-auto p-4">
    <h1 class="text-2xl font-bold text-center mb-6 text-emerald-400">TechFounder BR</h1>
    
    <div class="flex justify-around bg-gray-800 p-2 rounded-xl mb-6 text-sm">
      <button onclick="mostrarAba(0)" class="px-3 py-2">Dashboard</button>
      <button onclick="mostrarAba(1)" class="px-3 py-2">Mentor IA</button>
      <button onclick="mostrarAba(2)" class="px-3 py-2">Plano</button>
      <button onclick="mostrarAba(3)" class="px-3 py-2">Simulador</button>
    </div>

    <div id="aba0" class="aba">
      <p class="text-center text-gray-400 p-8">Bem-vindo ao TechFounder BR! 🚀<br>Escolha uma aba acima.</p>
    </div>

    <div id="aba1" class="aba hidden">
      <div id="chat" class="h-80 overflow-y-auto bg-gray-900 p-4 rounded-xl mb-4 text-sm"></div>
      <input id="mensagem" type="text" placeholder="Fala com o mentor..." class="w-full p-4 bg-gray-800 rounded-2xl text-sm">
      <button onclick="enviar()" class="w-full mt-3 bg-emerald-600 py-4 rounded-2xl font-medium">Enviar</button>
    </div>

    <script>
      let apiKey = "SUA_CHAVE_AQUI"; // Troque aqui pela sua chave do Gemini

      function mostrarAba(n) {
        document.querySelectorAll('.aba').forEach(aba => aba.classList.add('hidden'));
        document.getElementById('aba' + n).classList.remove('hidden');
      }

      async function enviar() {
        const input = document.getElementById('mensagem');
        const chat = document.getElementById('chat');
        const texto = input.value.trim();
        if (!texto) return;

        chat.innerHTML += `<p class="text-right mb-2"><strong>Você:</strong> ${texto}</p>`;
        input.value = '';

        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Você é um mentor de negócios e tecnologia no Brasil. Seja direto e prático: ${texto}` }] }]
            })
          });
          const data = await res.json();
          const resposta = data.candidates[0].content.parts[0].text;
          chat.innerHTML += `<p class="mb-4"><strong>Mentor:</strong> ${resposta}</p>`;
        } catch(e) {
          chat.innerHTML += `<p class="text-red-400">Erro: verifique sua chave API.</p>`;
        }
        chat.scrollTop = chat.scrollHeight;
      }

      mostrarAba(0);
    </script>
  </div>
</body>
</html>
